<!DOCTYPE html>
<html>
    <body>
        <p>i had code nad i learn today my promiss</p>
        <p id="demo"></p>
        <script>
            function myDisplayer(some){
                document.getElementById("demo").innerHTML = some;
            }
            function sum(a,b){
                var sum = a+b;
                myDisplayer(sum);
            }
            let myPromise = new Promise(function(myResolve, myReject) {
                let x = 0; // some code(try to change x to 5)
                if (x == 0) {
                    myResolve("OK");
                } else {
                    myReject("Error");
                }
            });
            myPromise.then(
                function(value) { sum(5, 10); },
                function(error) { console.log(error); }
            );
        </script>
    </body>
</html>
